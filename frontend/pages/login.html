<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesk — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e5e4e2;
      --border-focus: #94a3b8;
      --text-primary: #1c1c1a;
      --text-secondary: #6b6b67;
      --text-muted: #a8a8a4;
      --accent: #3b5bdb;
      --accent-hover: #2f4ac4;
      --accent-light: #eef1fd;
      --error: #c0392b;
      --success: #2d6a4f;
      --radius: 8px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── Left panel ── */
    .left-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    .wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .wordmark span {
      color: var(--accent);
    }

    .left-body {
      max-width: 340px;
    }

    .left-body h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.6px;
      line-height: 1.25;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .left-body p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-weight: 400;
    }

    .left-footer {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: var(--bg);
    }

    .form-card {
      width: 100%;
      max-width: 380px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 28px;
      background: var(--surface);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Form */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s ease;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus { border-color: var(--border-focus); }

    .submit-btn {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .submit-btn:hover { background: var(--accent-hover); }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      display: none;
    }

    .message.error {
      background: #fdf2f2;
      color: var(--error);
      border: 1px solid #f5c6c6;
      display: block;
    }

    .message.success {
      background: #f0faf5;
      color: var(--success);
      border: 1px solid #b7dfc9;
      display: block;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Left Panel -->
  <div class="left-panel">
    <div class="wordmark">Flow<span>Desk</span></div>

    <div class="left-body">
      <h1>Your day,<br/>structured.</h1>
      <p>Tasks, schedule, habits, and notes — everything you need to stay on top of your work, in one place.</p>
    </div>

    <div class="left-footer">v1.0 · personal build</div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="form-card">

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign in</button>
        <button class="tab-btn" onclick="switchTab('register')">Create account</button>
      </div>

      <!-- Login Form -->
      <div class="form-section active" id="login-section">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" id="login-btn" onclick="handleLogin()">Sign in</button>
        <div class="message" id="login-msg"></div>
      </div>

      <!-- Register Form -->
      <div class="form-section" id="register-section">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="reg-name" placeholder="Aadil" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" />
        </div>
        <button class="submit-btn" id="reg-btn" onclick="handleRegister()">Create account</button>
        <div class="message" id="reg-msg"></div>
      </div>

      <div class="divider"></div>
      <p class="hint">Your data is stored locally on your machine.</p>

    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8080/api';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('login-section').classList.toggle('active', tab === 'login');
      document.getElementById('register-section').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'message ' + type;
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');

      if (!email || !password) return showMsg('login-msg', 'Please fill in all fields.', 'error');

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg('login-msg', data.message || 'Invalid credentials.', 'error');
        } else {
          localStorage.setItem('fd_token', data.token);
          localStorage.setItem('fd_name', data.name);
          showMsg('login-msg', 'Welcome back, ' + data.name + '!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        }
      } catch (e) {
        showMsg('login-msg', 'Cannot reach server. Is it running?', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    async function handleRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const btn = document.getElementById('reg-btn');

      if (!name || !email || !password) return showMsg('reg-msg', 'Please fill in all fields.', 'error');
      if (password.length < 6) return showMsg('reg-msg', 'Password must be at least 6 characters.', 'error');

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg('reg-msg', data.message || 'Registration failed.', 'error');
        } else {
          localStorage.setItem('fd_token', data.token);
          localStorage.setItem('fd_name', data.name);
          showMsg('reg-msg', 'Account created. Taking you in...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        }
      } catch (e) {
        showMsg('reg-msg', 'Cannot reach server. Is it running?', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const activeSection = document.querySelector('.form-section.active').id;
        if (activeSection === 'login-section') handleLogin();
        else handleRegister();
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('fd_token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
